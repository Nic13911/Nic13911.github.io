<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Riego Inteligente</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Referencia a Chart.js -->
</head>
<body>
    <!-- Navbar superior -->
    <nav>
        <button id="btn-inicio">Inicio</button>
        <button id="btn-sensores">Sensores</button>
        <button id="btn-historial">Historial</button>
        <button id="btn-perfil">Perfil</button>
    </nav>

    <!-- Sección de Inicio -->
    <section id="inicio" class="section">
        <h1>Bienvenido al Sistema de Riego Inteligente</h1>
        <p>Este sistema te ayudará a gestionar el riego de tus cultivos según la humedad del suelo.</p>
    </section>

    <!-- Sección de Sensores -->
    <section id="sensores" class="section">
        <h1>Medición de Humedad</h1>
        <p>Humedad actual: <span id="humedad-actual">Cargando...</span></p>
        <button id="btn-ver-humedad">Ver Humedad Actual</button>
    </section>

    <!-- Sección de Historial -->
    <section id="historial" class="section">
        <h1>Historial de Humedad</h1>
        <ul id="lista-historial"></ul> <!-- Lista de historial de humedad -->
        <canvas id="humidityChart" width="400" height="200"></canvas> <!-- Gráfico del historial de humedad -->
    </section>

    <!-- Sección de Perfil -->
    <section id="perfil" class="section">
        <h1>Crear Perfil</h1>
        <form id="form-perfil">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required>
            <label for="mail">Mail:</label>
            <input type="email" id="mail" required>
            <label for="idioma">Idioma:</label>
            <select id="idioma">
                <option value="es">Español</option>
                <option value="en">Inglés</option>
            </select>
            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" required>
            <button type="submit">Crear Perfil</button>
        </form>
    </section>

    <!-- JS para funcionalidad -->
    <script src="script.js"></script>
</body>
</html>
